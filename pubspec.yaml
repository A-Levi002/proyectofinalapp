name: proyectofinalapp
description: "Aplicación de Transporte Público con pagos electrónicos"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Supabase — backend completo
  supabase_flutter: ^2.3.0

  # Google Maps
  google_maps_flutter: ^2.6.0

  # QR — generación
  qr_flutter: ^4.1.0

  # QR — escaneo
  mobile_scanner: ^5.1.1

  # HTTP
  http: ^1.2.0

  # OCR offline (lectura de CI y carnet universitario)
  google_mlkit_text_recognition: ^0.13.0

  # Storage local
  shared_preferences: ^2.2.2

  # PayPal webview
  webview_flutter: ^4.7.0
  url_launcher: ^6.2.0

  # Formateo de fechas y moneda
  intl: ^0.19.0

  # GPS — panel conductor y mapa trufis
  geolocator: ^11.0.0

  # Foto de perfil
  image_picker: ^1.0.0

  # Color dominante de imagen
  palette_generator: ^0.3.3+3

  # Biometría (huella dactilar)
  local_auth: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true